}

}

.left{

}

.right{

}

.download{

display:block;

margin-top:28px;

width:100%;

padding:17px;

color:white;

text-decoration:none;

border-radius:14px;

font-size:18px;

font-weight:bold;

transition:.25s;

}

.download:hover{

transform:translateY(-2px);

box-shadow:0 12px 35px rgba(59,130,246,.45);

}

.tip{

margin-top:18px;

text-align:center;

color:#94a3b8;

}

.footer{
